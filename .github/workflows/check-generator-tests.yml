name: Check Generator Tests

on:
  pull_request:

jobs:
  generator-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jsonnet
        run: |
          JSONNET_VERSION="v0.20.0"
          curl -sL "https://github.com/google/go-jsonnet/releases/download/${JSONNET_VERSION}/go-jsonnet_${JSONNET_VERSION#v}_Linux_x86_64.tar.gz" | tar xz -C /usr/local/bin jsonnet
          jsonnet --version

      - uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Run generator tests
        run: |
          set -euo pipefail
          python3 -m unittest discover -s tests -p 'test_*.py'
