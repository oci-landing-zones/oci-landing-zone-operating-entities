name: Check Generated Files

on: [pull_request]
jobs:
  Templates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install jsonnet
        run: |
          JSONNET_VERSION="v0.20.0"
          curl -sL "https://github.com/google/go-jsonnet/releases/download/${JSONNET_VERSION}/go-jsonnet_${JSONNET_VERSION#v}_Linux_x86_64.tar.gz" \
            | tar xz -C /usr/local/bin jsonnet
          jsonnet --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Regenerate and verify
        run: |
          set -eou pipefail
          echo "INFO: Running ./gen/generate.sh to regenerate all files from templates..."
          ./gen/generate.sh

          echo "---"
          echo "INFO: Checking for differences between committed and regenerated files..."

          if git diff --exit-code; then
            echo "---"
            echo "SUCCESS: All generated files are up to date."
          else
            echo "---"
            echo "ERROR: Generated files are out of date."
            echo ""
            echo "This can happen when:"
            echo "  1. A .jsonnet template was modified without regenerating"
            echo "  2. A .libsonnet dependency was modified without regenerating"
            echo "  3. gen/format_json.py was modified without regenerating"
            echo "  4. A generated .json file was manually edited"
            echo ""
            echo "To fix, run:"
            echo "  ./gen/generate.sh"
            echo "Then commit the updated files."
            echo "::error::Generated files are out of date. Run ./gen/generate.sh and commit the result."
            exit 1
          fi
