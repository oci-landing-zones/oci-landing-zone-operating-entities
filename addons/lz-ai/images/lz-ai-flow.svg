<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">AI guided Operating Entities setup</title>
  <desc id="desc">A three step flow for preparing AI, guiding the setup and reviewing deployment artifacts for an OCI Landing Zone Operating Entities design.</desc>
  <rect width="960" height="360" rx="18" fill="#f8f4ec"/>
  <rect x="28" y="28" width="904" height="304" rx="14" fill="#ffffff" stroke="#e5dfd3"/>

  <text x="60" y="76" fill="#4f3326" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">AI guided Operating Entities setup</text>
  <text x="60" y="106" fill="#64554a" font-family="Arial, Helvetica, sans-serif" font-size="15">Prepare knowledge, guide the setup, review and deploy</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f3326"/>
    </marker>
  </defs>

  <g font-family="Arial, Helvetica, sans-serif">
    <circle cx="174" cy="156" r="34" fill="#ffffff" stroke="#c9b9a7" stroke-width="2"/>
    <text x="164" y="168" fill="#111111" font-size="34" font-weight="700">1</text>
    <text x="86" y="224" fill="#111111" font-size="22" font-weight="700">Prepare Your AI</text>
    <text x="88" y="251" fill="#5c514a" font-size="15">Repo knowledge and Jsonnet ready</text>

    <path d="M 282 157 C 337 166, 392 166, 448 157" fill="none" stroke="#4f3326" stroke-width="3" marker-end="url(#arrow)"/>

    <circle cx="480" cy="156" r="34" fill="#ffffff" stroke="#c9b9a7" stroke-width="2"/>
    <text x="470" y="168" fill="#111111" font-size="34" font-weight="700">2</text>
    <text x="376" y="224" fill="#111111" font-size="22" font-weight="700">AI Guides the Setup</text>
    <text x="399" y="251" fill="#5c514a" font-size="15">Target landing zone draft</text>

    <path d="M 590 157 C 645 166, 700 166, 756 157" fill="none" stroke="#4f3326" stroke-width="3" marker-end="url(#arrow)"/>

    <circle cx="786" cy="156" r="34" fill="#ffffff" stroke="#c9b9a7" stroke-width="2"/>
    <text x="776" y="168" fill="#111111" font-size="34" font-weight="700">3</text>
    <text x="715" y="224" fill="#111111" font-size="22" font-weight="700">Run &amp; Deploy</text>
    <text x="718" y="251" fill="#5c514a" font-size="15">Reviewed artifacts</text>

    <rect x="173" y="294" width="614" height="30" rx="15" fill="#4f3326"/>
    <text x="214" y="314" fill="#ffffff" font-size="14" font-weight="700">Faster discovery</text>
    <circle cx="356" cy="309" r="3" fill="#e5b95f"/>
    <text x="381" y="314" fill="#ffffff" font-size="14" font-weight="700">Traceable drafts</text>
    <circle cx="528" cy="309" r="3" fill="#e5b95f"/>
    <text x="553" y="314" fill="#ffffff" font-size="14" font-weight="700">Security centered review</text>
  </g>
</svg>
